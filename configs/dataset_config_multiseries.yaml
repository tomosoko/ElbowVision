# =============================================================
# ElbowVision Production Multi-Series DRR Dataset Config
# 3ボリューム (180/135/90) -> YOLO訓練用データセット
# =============================================================

# --- CT入力 (マルチシリーズ: FC85骨カーネル) ---
ct_dir: data/raw_dicom/ct_volume/ﾃｽﾄ 008_0009900008_20260310_108Y_F_000

# --- 出力先 ---
out_dir: data/yolo_dataset_production

# --- DRR生成パラメータ ---
target_size: 256            # 128(速度) と 512(品質) の妥協点
sid: 1000.0                 # X線管焦点-検出器間距離 (mm)

# --- 複数シリーズ設定 ---
# FC85骨カーネル: Series 4(伸展180°), 8(135°), 12(屈曲90°)
series_nums: "4,8,12"
base_flexions: "180,135,90"

# --- ビュー別生成枚数 ---
# LAT多め: 屈曲2ボリューム(135/90)で角度バリエーション豊富
n_ap: 300
n_lat: 600

# --- HUウィンドウ (ファントム最適化済み) ---
hu_min: 50.0
hu_max: 1000.0              # 骨等価樹脂P95=972HUをカバー

# --- ドメイン適応augmentation ---
domain_aug: true

# --- ビュー ---
views: AP,LAT

# --- データ分割 ---
train_val_split: 0.85       # 85% train / 15% val
