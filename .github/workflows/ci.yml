name: ElbowVision CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip
          cache-dependency-path: elbow-api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r elbow-api/requirements.txt
          pip install pytest

      - name: Run elbow-train tests (no DICOM/model required)
        run: |
          python -m pytest tests/test_elbow_synth.py tests/test_dicom_to_png.py tests/test_ct_reorient.py -v --tb=short

      - name: Run API tests
        working-directory: elbow-api
        run: |
          python -m pytest tests/ -v --tb=short
